<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Sign in · Tamato</title>
<link rel="icon" href="/icon.png">
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&family=Roboto+Mono:wght@400;500&family=Syne:wght@700;800&display=swap" rel="stylesheet">
<link rel="stylesheet" href="/css/global.css">
<link rel="stylesheet" href="/css/auth.css">
<script>(function(){var t=localStorage.getItem('tm_theme')||'dark';document.documentElement.setAttribute('data-theme',t);document.documentElement.style.colorScheme=t;})();</script>
</head>
<body>
<div class="auth-wrap">
  <div class="auth-card">
    <div class="auth-logo"><img src="/assets/logo.svg" alt="Tamato" width="130"></div>
    <h1 class="auth-title">Welcome back</h1>
    <p class="auth-sub">Sign in to build, design, and own.</p>

    <button class="auth-google" id="google">
      <svg width="18" height="18" viewBox="0 0 24 24"><path fill="#4285F4" d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92a5.06 5.06 0 0 1-2.2 3.32v2.77h3.57c2.08-1.92 3.27-4.74 3.27-8.1z"/><path fill="#34A853" d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84A11 11 0 0 0 12 23z"/><path fill="#FBBC05" d="M5.84 14.1a6.6 6.6 0 0 1 0-4.2V7.06H2.18a11 11 0 0 0 0 9.88l3.66-2.84z"/><path fill="#EA4335" d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.06l3.66 2.84C6.71 7.31 9.14 5.38 12 5.38z"/></svg>
      Continue with Google
    </button>

    <div class="auth-divider">or</div>

    <form id="form">
      <div class="auth-field">
        <label class="tm-label" for="email">Email</label>
        <input class="tm-input" type="email" id="email" autocomplete="email" required>
      </div>
      <div class="auth-field">
        <label class="tm-label" for="password">Password</label>
        <input class="tm-input" type="password" id="password" autocomplete="current-password" required>
      </div>
      <div class="auth-error" id="err"></div>
      <div class="auth-actions">
        <button class="tm-btn tm-btn-primary" type="submit" id="submit">Sign in</button>
      </div>
    </form>

    <p class="auth-foot">New to Tamato? <a href="/signup.html">Create an account</a></p>
  </div>
</div>

<script type="module">
import { signInEmail, signInGoogle, getSession } from '/js/supabase.js';

const form = document.getElementById('form');
const err = document.getElementById('err');
const card = document.querySelector('.auth-card');

(async () => { if (await getSession()) location.href = '/dashboard.html'; })();

function fail(msg) {
  err.textContent = msg;
  card.classList.remove('tm-shake'); void card.offsetWidth; card.classList.add('tm-shake');
}

form.addEventListener('submit', async (e) => {
  e.preventDefault();
  err.textContent = '';
  const btn = document.getElementById('submit');
  btn.disabled = true; btn.textContent = 'Signing in…';
  const { error } = await signInEmail(email.value.trim(), password.value);
  btn.disabled = false; btn.textContent = 'Sign in';
  if (error) return fail(error.message || 'Could not sign in. Check your details.');
  const dest = sessionStorage.getItem('tm_redirect_after_login') || '/dashboard.html';
  sessionStorage.removeItem('tm_redirect_after_login');
  location.href = dest;
});

document.getElementById('google').addEventListener('click', async () => {
  const { error } = await signInGoogle();
  if (error) fail(error.message || 'Google sign-in failed.');
});
</script>
</body>
</html>
